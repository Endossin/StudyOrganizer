<mat-sidenav-container style="height: 100vh;">
  <mat-sidenav mode="side" opened style="width: 220px; padding: 16px;">
    <div style="display: flex; align-items: center; gap: 10px; padding: 8px 8px 24px 8px; border-bottom: 1px solid var(--border); margin-bottom: 12px;">
      <span style="font-size: 24px;">📚</span>
      <h2 style="margin: 0; font-size: 18px; font-weight: 700; color: var(--accent);">Study</h2>
    </div>
    <mat-nav-list>
      <a mat-list-item routerLink="/materias" routerLinkActive="active-link">
        <mat-icon matListItemIcon>menu_book</mat-icon>
        <span matListItemTitle>Matérias</span>
      </a>
      <a mat-list-item routerLink="/tarefas" routerLinkActive="active-link">
        <mat-icon matListItemIcon>check_circle</mat-icon>
        <span matListItemTitle>Tarefas</span>
      </a>
      <a mat-list-item routerLink="/cronograma" routerLinkActive="active-link">
        <mat-icon matListItemIcon>calendar_month</mat-icon>
        <span matListItemTitle>Cronograma</span>
      </a>
      <a mat-list-item routerLink="/pomodoro" routerLinkActive="active-link">
        <mat-icon matListItemIcon>timer</mat-icon>
        <span matListItemTitle>Pomodoro</span>
      </a>
      <a mat-list-item routerLink="/anotacoes" routerLinkActive="active-link">
        <mat-icon matListItemIcon>notes</mat-icon>
        <span matListItemTitle>Anotações</span>
      </a>
      <a mat-list-item routerLink="/progresso" routerLinkActive="active-link">
        <mat-icon matListItemIcon>bar_chart</mat-icon>
        <span matListItemTitle>Progresso</span>
      </a>
    </mat-nav-list>
  </mat-sidenav>
  <mat-sidenav-content style="padding: 24px;">
    <router-outlet />
  </mat-sidenav-content>
</mat-sidenav-container>
